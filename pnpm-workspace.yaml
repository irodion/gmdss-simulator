packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@playwright/test": ^1.59.1
  "@types/node": ^24
  "@vitejs/plugin-react": ^6.0.1
  "@vitest/coverage-v8": ^4.1.2
  happy-dom: ^20.8.9
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
