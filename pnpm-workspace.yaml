packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@fastify/cookie": ^11.0.2
  "@fastify/cors": ^11.2.0
  "@fastify/rate-limit": ^10.3.0
  "@node-rs/argon2": ^2.0.2
  "@playwright/test": ^1.59.1
  "@types/node": ^24
  "@vitejs/plugin-react": ^6.0.1
  "@vitest/coverage-v8": ^4.1.2
  better-auth: ^1.5.6
  drizzle-orm: ^0.45.2
  fake-indexeddb: ^6.2.5
  fastify: ^5.8.4
  fastify-plugin: ^5.1.0
  happy-dom: ^20.8.9
  i18next: ^26.0.3
  idb: ^8.0.3
  ioredis: ^5.10.1
  jose: ^6.2.2
  otpauth: ^9.5.0
  react-i18next: ^17.0.2
  react-router: ^7.14.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plugin-pwa: ^1.2.0
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zod: ^4.3.6

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
  serialize-javascript: ">=7.0.5"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
