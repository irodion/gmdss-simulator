name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install Playwright browsers
        run: vp dlx playwright install --with-deps chromium

      - name: Check (lint + format + type-check)
        run: vp check

      - name: Semgrep security scan
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

      - name: Test with coverage
        run: vp run -r test

      - name: E2E tests
        run: ./node_modules/.bin/playwright test

      - name: Build
        run: vp run -r build

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/frontend/coverage/
          retention-days: 7

      - name: Upload Playwright report
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for dependency changes
        id: deps-changed
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '(pnpm-lock\.yaml|package\.json|pnpm-workspace\.yaml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan dependencies
        if: steps.deps-changed.outputs.changed == 'true'
        uses: safedep/vet-action@v1
