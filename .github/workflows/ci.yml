name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast checks on every PR — no infrastructure needed
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Build utils package (types needed by frontend check)
        run: vp run build
        working-directory: packages/utils

      - name: Check (lint + format + type-check)
        run: vp check

      - name: Semgrep security scan
        run: pip install semgrep && semgrep scan --config auto --error

      - name: Unit tests (frontend) with coverage
        run: vp test --coverage
        working-directory: apps/frontend

      - name: Unit tests (utils) with coverage
        run: vp test --coverage
        working-directory: packages/utils

      - name: Build
        run: vp run -r build

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            apps/frontend/coverage/
            packages/utils/coverage/
          retention-days: 7

  # Integration tests after merge — requires PostgreSQL + Redis
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gmdss_test
          POSTGRES_USER: gmdss
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgres://gmdss@localhost:5432/gmdss_test
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: ci-test-secret-at-least-32-characters-long
      APP_URL: http://localhost:4173

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Build utils package
        run: vp run build
        working-directory: packages/utils

      - name: Run database migrations
        run: cd packages/db && vp exec drizzle-kit migrate

      - name: Seed database
        run: cd packages/db && node src/seed.ts

      - name: Test (db schema)
        run: vp test
        working-directory: packages/db

      - name: Test (API)
        run: vp test
        working-directory: apps/api

  vet:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check if deps changed
        id: deps
        uses: dorny/paths-filter@v4
        with:
          filters: |
            deps:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'apps/*/package.json'
              - 'packages/*/package.json'
      - name: Run vet
        if: steps.deps.outputs.deps == 'true'
        uses: safedep/vet-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          policy: .github/vet-policy.yml
          paranoid: true
      - name: Skip vet
        if: steps.deps.outputs.deps != 'true'
        run: echo "No dependency changes — skipping vet scan"
