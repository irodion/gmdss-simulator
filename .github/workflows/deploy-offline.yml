name: Deploy offline PWA

on:
  push:
    branches: [main]
    paths:
      - "apps/offline/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-offline.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/offline/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-offline.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: deploy-offline-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Build offline PWA
        run: vp build
        working-directory: apps/offline

      - name: Deploy to Cloudflare Pages
        id: deploy
        working-directory: ${{ runner.temp }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          npx --yes wrangler@3 pages deploy "$GITHUB_WORKSPACE/apps/offline/dist" \
            --project-name=roc-trainer \
            --branch="$DEPLOY_BRANCH" 2>&1 | tee deploy.log
          url=$(grep -oE 'https://[a-z0-9-]+\.roc-trainer\.pages\.dev' deploy.log | tail -n 1)
          echo "deployment-url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deployment-url != ''
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const marker = "<!-- offline-pwa-preview -->";
            const body = `${marker}\n🚀 **Offline PWA preview**: ${process.env.DEPLOY_URL}\n\n_Updated by commit ${context.sha.slice(0, 7)}._`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
