name: Deploy offline PWA

on:
  push:
    branches: [main]
    paths:
      - "apps/offline/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-offline.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/offline/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-offline.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: deploy-offline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Build offline PWA
        run: vp build
        working-directory: apps/offline

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: >-
            pages deploy apps/offline/dist
            --project-name=roc-trainer
            --branch=${{ github.head_ref || github.ref_name }}
